services:
  frontend:
    build: ./chessboard
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=/api

  backend:
    build: ./engine

  proxy:
    image: nginx:alpine
    ports:
      - "6700:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
